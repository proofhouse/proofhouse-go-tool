StylesPath = .vale
MinAlertLevel = warning
Vocab = proofhouse
Packages = \
  https://github.com/errata-ai/Google/releases/download/v0.6.3/Google.zip, \
  https://github.com/errata-ai/write-good/releases/download/v0.4.1/write-good.zip, \
  https://github.com/errata-ai/proselint/releases/download/v0.3.4/proselint.zip, \
  https://github.com/tbhb/vale-ai-tells/releases/download/v1.10.0/ai-tells.zip, \
  https://github.com/tbhb/vale-ai-tells/releases/download/v1.10.0/ai-tells-commits.zip, \
  https://github.com/tbhb/vale-ai-tells/releases/download/v1.10.0/ai-tells-experimental.zip

