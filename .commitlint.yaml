---
min-version: v0.12.0
formatter: default
rules:
  - header-min-length
  - header-max-length
  - body-max-line-length
  - footer-max-line-length
  - type-enum
  - signed-off-by
severity:
  default: error
  rules: {}
settings:
  # Most subject lines fit comfortably under 72, but scoped recipes
  # (`ci(just): wire container-pinned golangci-lint with lint and
  # format recipes`) push slightly over. 80 keeps the gate strict
  # without forcing artificial truncation.
  header-max-length:
    argument: 80
    flags: {}
  header-min-length:
    argument: 10
    flags: {}
  # Commit bodies frequently embed Markdown reference links to specs,
  # blog posts, and external docs. Long URLs blow past the default
  # 100-char limit. 200 keeps the gate honest about genuinely run-on
  # prose without forcing line breaks inside `[text](url)` constructs.
  body-max-line-length:
    argument: 200
    flags: {}
  footer-max-line-length:
    argument: 100
    flags: {}
  type-enum:
    argument:
      - feat
      - fix
      - docs
      - style
      - refactor
      - perf
      - test
      - build
      - ci
      - chore
      - revert
    flags: {}
  signed-off-by:
    argument: "Signed-off-by"
    flags: {}
disable-default-ignores: false
ignores: []
