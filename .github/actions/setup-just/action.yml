---
# Install `just` from a SHA-pinned casey/just release tarball and
# verify it against the bundled SHA256SUMS. Every workflow that needs
# `just` consumes this composite instead of duplicating the install
# block, so the verification flow stays auditable in one place. The
# default version pins the project-wide release; a workflow that
# wants a different version passes it through the `just-version`
# input. Renovate's github-releases datasource tracks the default via
# the trailing marker on the literal.

name: Setup just
description: Install just from a SHA-pinned casey/just release tarball, verified against the bundled SHA256SUMS.

inputs:
  just-version:
    description: just version to install (defaults to the project-wide pinned release).
    required: false
    default: '1.51.0'  # renovate: datasource=github-releases depName=casey/just

runs:
  using: composite
  steps:
    - name: Install just
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        JUST_VERSION: ${{ inputs.just-version }}
      run: |
        set -euo pipefail
        asset="just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz"
        tmp=$(mktemp -d)
        cd "$tmp"
        gh release download "${JUST_VERSION}" \
          --repo casey/just \
          --pattern "${asset}" \
          --pattern SHA256SUMS
        sha256sum --ignore-missing --check SHA256SUMS
        tar -xzf "${asset}"
        install -m 0755 just /usr/local/bin/just
        just --version
