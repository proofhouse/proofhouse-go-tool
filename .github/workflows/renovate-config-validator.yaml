---
# PR gate that catches broken Renovate config before it lands on main,
# delegated to the org-shared reusable workflow in proofhouse/github-actions.
# That workflow runs the same digest-pinned Renovate engine the Renovate
# runner uses, against this repo's checkout. Its config_path input defaults
# to .github/renovate.json5, where this repo keeps its config, so the call
# passes no inputs. The pull_request trigger lives here because a reusable
# workflow's own `on:` block does not fire from a caller. Pinned by commit
# SHA; the trailing tag comment marks the matching release for Renovate.
name: Validate Renovate configuration

on:
  pull_request:
    paths:
      # Catch nested renovate configs too if/when subprojects appear.
      - "**renovate.json5"

permissions:
  contents: read

jobs:
  validate:
    permissions:
      contents: read
    # yamllint disable-line rule:line-length
    uses: proofhouse/github-actions/.github/workflows/renovate-config-validator.yaml@c55eeb3115d95f6b8777538b4d6f49d48830e199 # v0.2.0
