---
# Self-hosted Renovate, delegated to the org-shared reusable workflow in
# proofhouse/github-actions. That workflow mints a proofhouse-renovate[bot]
# installation token, checks out this repo, and runs the digest-pinned
# Renovate engine against .github/renovate.json5, so this repo's config
# still drives every update and carries a DCO sign-off matching gitAuthor.
# The schedule and dispatch triggers live here because a reusable
# workflow's own `on:` block does not fire from a caller. Pinned by commit
# SHA; the trailing tag comment marks the matching release for Renovate.
#
# End-to-end execution depends on the proofhouse-renovate App being
# registered and the RENOVATE_CLIENT_ID / RENOVATE_PRIVATE_KEY secrets
# being set; until then this workflow is wired but inert.
name: Renovate

on:
  schedule:
    # Hourly on weekdays, every two hours on weekends. Matches Cilium's
    # cadence: fast enough to catch CVEs the same business day, slack
    # enough to avoid wasting API budget on quiet weekends.
    - cron: "0 * * * 1-5"
    - cron: "0 */2 * * 6,0"
  workflow_dispatch:
    inputs:
      renovate_log_level_debug:
        type: boolean
        description: "Run Renovate with debug log levels"
        default: true

permissions:
  contents: read

jobs:
  renovate:
    permissions:
      contents: read
    # yamllint disable-line rule:line-length
    uses: proofhouse/github-actions/.github/workflows/renovate.yaml@ffc278f8a5826e61763eb837bb5bc2199a26b86b # v0.2.2
    with:
      renovate_log_level_debug: ${{ github.event.inputs.renovate_log_level_debug == 'true' }}
    secrets:
      RENOVATE_CLIENT_ID: ${{ secrets.RENOVATE_CLIENT_ID }}
      RENOVATE_PRIVATE_KEY: ${{ secrets.RENOVATE_PRIVATE_KEY }}
