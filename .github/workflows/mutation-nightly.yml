---
# Nightly mutation sweep. Runs gremlins across the whole module and
# reports which mutants the test suite kills versus which survive, so
# mutation analysis happens off the critical path rather than on every
# PR. Gremlins reruns the entire suite per mutant, far too slow to gate
# a pull request. The workflow invokes the same `just mutate-all` recipe
# contributors run locally, overriding only the timeout coefficient, so
# the recipe stays the single source of truth for what gets mutated.
# Mirrors the fuzz / fuzz-nightly split where one recipe powers both the
# inner loop and the scheduled sweep.
#
# Gremlins exits zero whatever the score (the recipe sets no threshold),
# so the survivor report lands in the run log rather than reddening the
# run. A contributor reads the LIVED and NOT COVERED lines to find the
# assertion gaps that line coverage misses.

name: mutation-nightly

on:
  schedule:
    # 04:42 UTC nightly. Off-peak and off the top of the hour, clear of
    # the fuzz-nightly slot (03:17) so the two sweeps never queue against
    # each other.
    - cron: "42 4 * * *"
  workflow_dispatch:
    inputs:
      timeout_coefficient:
        description: "Per-mutant test-time budget multiplier (gremlins --timeout-coefficient)"
        type: string
        default: "100"

permissions:
  contents: read

concurrency:
  # Serialize scheduled and manual runs so an on-demand dispatch never
  # races a nightly run. Never cancel a run in flight: a half-finished
  # sweep is wasted compute.
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  mutate:
    name: mutate
    runs-on: ubuntu-24.04
    # The covered-mutant set finishes in well under a minute today, but
    # gremlins reruns the whole suite per mutant, so the ceiling scales
    # with covered mutants times suite runtime. Keep it generous and
    # revisit as the package set grows.
    timeout-minutes: 60
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: false

      - name: Set up just
        uses: proofhouse/github-actions/.github/actions/setup-just@8fc147c5b166239ee72e04ffc17dc85a40888d0e # v0.2.1

      - name: Run mutation sweep
        env:
          # Scheduled runs carry no inputs, so fall back to the dispatch default.
          GREMLINS_TIMEOUT_COEFFICIENT: ${{ github.event.inputs.timeout_coefficient || '100' }}
        run: just mutate-all
