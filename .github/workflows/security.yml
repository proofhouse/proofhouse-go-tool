---
# Supply-chain security scanners that report to GitHub Code Scanning.
# Two jobs run the project's dependency scanners with SARIF output and
# upload each result under its own category: govulncheck over the call
# graph, and gomodscan over the vendored module set (retraction,
# deprecation, and OSV malicious-package checks).
#
# Triggers cover pull requests and pushes to `main` — the pushes seed
# the Code Scanning baseline that pull-request diffs compare against —
# plus a daily cron that catches advisories published against
# already-merged dependencies long after the pull request that added
# them. Findings surface in the Security tab through SARIF rather than
# failing the run, so a warning-level deprecation does not gate a pull
# request. The blocking govulncheck gate stays in `ci.yml`.
#
# Each job installs `just` from the SHA-pinned setup-just composite and
# invokes the matching `just *-sarif` recipe, so the scan command stays
# the single source of truth shared with local runs.

name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "37 7 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: false

      - name: Set up just
        uses: proofhouse/github-actions/.github/actions/setup-just@ffc278f8a5826e61763eb837bb5bc2199a26b86b # v0.2.2

      - name: Run govulncheck (SARIF)
        run: just vuln-sarif govulncheck.sarif

      - name: Upload govulncheck SARIF
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          sarif_file: govulncheck.sarif
          category: govulncheck

  gomodscan:
    name: gomodscan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: false

      - name: Set up just
        uses: proofhouse/github-actions/.github/actions/setup-just@ffc278f8a5826e61763eb837bb5bc2199a26b86b # v0.2.2

      - name: Run gomodscan (SARIF)
        run: just gomodscan-sarif gomodscan.sarif

      - name: Upload gomodscan SARIF
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4
        with:
          sarif_file: gomodscan.sarif
          category: gomodscan
