---
# CodeQL static analysis for the Go source and for the GitHub
# Actions workflows themselves. Runs on every pull request, every
# push to `main`, and weekly so the analysis re-evaluates `main`
# against newly published query updates even when nothing in the
# tree changed. Results upload to the repository's code-scanning
# dashboard as SARIF.
#
# Two languages analyze in parallel matrix slots. `go` builds with
# CodeQL autobuild; the vendored module graph lets `go build ./...`
# resolve without network fetches. `actions` scans the workflow
# files with no build step. Both run the `security-extended` query
# suite, which widens the security ruleset without pulling in the
# code-quality queries that would overlap golangci-lint.

name: codeql

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, Sunday 03:27 UTC. Off-peak and off the top of the hour
    # so the run avoids the busiest scheduler slots.
    - cron: "27 3 * * 0"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: "analyze (${{ matrix.language }})"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
      actions: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: autobuild
          - language: actions
            build-mode: none
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Pin the Go toolchain to the version in go.mod so autobuild
      # builds with it instead of the CodeQL bundle's older Go.
      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:${{ matrix.language }}"
