---
# Lint every workflow under `.github/workflows/` via actionlint. The
# job runs on every PR that touches a workflow file and on every push
# to `main`, so the lint gate guards both ends of the integration
# path. Delegates to the org-shared reusable workflow in
# proofhouse/github-actions, which checks out this repo and runs the
# digest-pinned actionlint image, so this repo's .github/actionlint.yaml
# still applies. Pinned by commit SHA; the trailing tag comment marks
# the matching release for Renovate.

name: lint-workflows

on:
  push:
    branches: [main]
    paths: ['.github/workflows/**']
  pull_request:
    paths: ['.github/workflows/**']

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  actionlint:
    permissions:
      contents: read
    # yamllint disable-line rule:line-length
    uses: proofhouse/github-actions/.github/workflows/lint-workflows.yml@8a68c5a598cc9470e7def59b6c427cd1e354fbb4 # v0.1.0
