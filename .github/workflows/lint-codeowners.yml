---
# Validate `.github/CODEOWNERS` on every pull request, so a broken rule
# fails review instead of quietly sending reviews to the wrong owners
# once it lands on `main`. The workflow self-tests: it validates the
# CODEOWNERS file that arrives in this very PR, the same way
# renovate-config-validator and codeql validated themselves on arrival.
#
# Two checks, both satisfied by the default read-only token:
#
#   1. Owners and syntax, via GitHub's own CODEOWNERS validator (the
#      `codeowners/errors` REST endpoint). GitHub computes this
#      server-side from its org and team knowledge, so it flags an
#      unknown owner or an owner without write access without the
#      workflow ever holding a `read:org` token. The repository is
#      public, so the endpoint needs no elevated scope.
#
#   2. Path existence, via a local tree walk: every rule's pattern must
#      still match a tracked path, which catches a PR that deletes a
#      file a rule references. The `'**'` path filter runs the workflow
#      on every PR, so a deletion anywhere re-triggers the check and the
#      gate can be required without ever skipping.

name: lint-codeowners

on:
  pull_request:
    paths:
      - .github/CODEOWNERS
      - '**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-codeowners:
    name: lint-codeowners
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check owners and syntax
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          errors="$(gh api \
            "repos/${GITHUB_REPOSITORY}/codeowners/errors?ref=${HEAD_SHA}" \
            --jq '.errors')"
          count="$(printf '%s' "${errors}" | jq 'length')"
          if [ "${count}" -ne 0 ]; then
            echo "::error::CODEOWNERS has ${count} owner or syntax error(s):"
            printf '%s' "${errors}" |
              jq -r '.[] | "  line \(.line): \(.kind) — \(.message)"'
            exit 1
          fi
          echo "CODEOWNERS owners and syntax: OK"

      - name: Check rule paths exist
        run: |
          codeowners=".github/CODEOWNERS"
          rc=0
          patterns="$(awk '{ sub(/#.*/, "") } NF { print $1 }' "${codeowners}")"
          while IFS= read -r pattern; do
            [ -n "${pattern}" ] || continue
            case "${pattern}" in
              '*' | '**') continue ;;
            esac
            matches="$(git ls-files -- "${pattern#/}")"
            if [ -z "${matches}" ]; then
              echo "::error file=${codeowners}::pattern '${pattern}' matches no tracked path"
              rc=1
            fi
          done <<EOF
          ${patterns}
          EOF
          if [ "${rc}" -eq 0 ]; then
            echo "CODEOWNERS rule paths: OK"
          fi
          exit "${rc}"
