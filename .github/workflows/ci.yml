---
# Main quality gate. Runs the Go-flavored lint set, the test suite,
# the race detector, govulncheck, and the vendor-drift check on every
# pull request and every push to `main`. Each component runs as its
# own job so a flake in one block does not require rerunning the
# others and the PR status surfaces which gate fired. The non-Go
# lint set (vale, cspell, rumdl, biome, yamllint) lands in follow-up
# workflows that handle each tool's distinct install path.
#
# Every job installs `just` from a SHA-pinned casey/just release
# tarball, verifies the bundled SHA256SUMS, and then invokes the
# matching `just <recipe>` so the recipe is the single source of
# truth for what the gate runs. The local `just check` and
# `just check-all` aggregators stay in lockstep with this workflow.

name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # renovate: datasource=github-releases depName=casey/just
  JUST_VERSION: 1.51.0

jobs:
  lint-go:
    name: lint-go
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: false

      - name: Install just
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          asset="just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tmp=$(mktemp -d)
          cd "$tmp"
          gh release download "${JUST_VERSION}" \
            --repo casey/just \
            --pattern "${asset}" \
            --pattern SHA256SUMS
          sha256sum --ignore-missing --check SHA256SUMS
          tar -xzf "${asset}"
          install -m 0755 just /usr/local/bin/just
          just --version

      - name: Run Go-flavored lints
        run: just lint-go-all

  test:
    name: test
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: false

      - name: Install just
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          asset="just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tmp=$(mktemp -d)
          cd "$tmp"
          gh release download "${JUST_VERSION}" \
            --repo casey/just \
            --pattern "${asset}" \
            --pattern SHA256SUMS
          sha256sum --ignore-missing --check SHA256SUMS
          tar -xzf "${asset}"
          install -m 0755 just /usr/local/bin/just
          just --version

      - name: Run tests
        run: just test

  test-race:
    name: test-race
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: false

      - name: Install just
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          asset="just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tmp=$(mktemp -d)
          cd "$tmp"
          gh release download "${JUST_VERSION}" \
            --repo casey/just \
            --pattern "${asset}" \
            --pattern SHA256SUMS
          sha256sum --ignore-missing --check SHA256SUMS
          tar -xzf "${asset}"
          install -m 0755 just /usr/local/bin/just
          just --version

      - name: Run tests with race detector
        run: just test-race

  vuln:
    name: vuln
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: false

      - name: Install just
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          asset="just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tmp=$(mktemp -d)
          cd "$tmp"
          gh release download "${JUST_VERSION}" \
            --repo casey/just \
            --pattern "${asset}" \
            --pattern SHA256SUMS
          sha256sum --ignore-missing --check SHA256SUMS
          tar -xzf "${asset}"
          install -m 0755 just /usr/local/bin/just
          just --version

      - name: Run govulncheck
        run: just vuln

  vendor-check:
    name: vendor-check
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          check-latest: false

      - name: Install just
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          asset="just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tmp=$(mktemp -d)
          cd "$tmp"
          gh release download "${JUST_VERSION}" \
            --repo casey/just \
            --pattern "${asset}" \
            --pattern SHA256SUMS
          sha256sum --ignore-missing --check SHA256SUMS
          tar -xzf "${asset}"
          install -m 0755 just /usr/local/bin/just
          just --version

      - name: Check vendor drift
        run: just vendor-check
